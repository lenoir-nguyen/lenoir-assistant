version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15-latest
    container_name: lenoir-postgres
    environment:
      POSTGRES_USER: lenoir_user
      POSTGRES_PASSWORD: lenoir_password
      POSTGRES_DB: lenoir_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lenoir_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lenoir-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lenoir-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lenoir_user:lenoir_password@postgres:5432/lenoir_chatbot
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OWNER_PIN_HASH: ${OWNER_PIN_HASH}
      DEBUG: "false"
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - lenoir-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  lenoir-network:
    driver: bridge
