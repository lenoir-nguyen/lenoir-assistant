# Alembic configuration file
# Provides settings for database migration management

[alembic]
# Path to migration scripts
script_location = alembic

# Name of template_sources to use (default: generic)
sqlalchemy.url = driver://user:pass@localhost/dbname

# Template default
version_path_separator = :

# Name of the template to use
#sqlalchemy.url = postgresql://user:password@localhost/lenoir_chatbot

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
